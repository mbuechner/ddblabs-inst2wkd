<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DDB XML Compare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-1: #f5f8fc;
      --bg-2: #e9f0fa;
      --ink: #0d1b2a;
    }

    html, body {
      height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(1200px 700px at 0% 0%, #d9e8fb 0%, transparent 60%),
        radial-gradient(900px 600px at 100% 100%, #dce9f5 0%, transparent 55%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }

    textarea.codebox {
      min-height: 340px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.87rem;
      line-height: 1.35;
      white-space: pre;
      border: 1px solid #ced8e5;
      border-radius: 10px;
      background: #fbfdff;
    }

    #diffOutput {
      overflow: auto;
    }

    .d2h-wrapper {
      border: 1px solid #ced8e5;
      border-radius: 10px;
      background: #fff;
      padding: 0.5rem;
    }

  </style>
</head>
<body>
  <div class="container-fluid min-vh-100 p-3">
    <div class="card border-0 shadow-lg overflow-hidden h-100">
      <div class="card-header bg-light bg-gradient py-3 px-3 px-lg-4">
        <h1 class="h5 mb-0 fw-bold">XML-Vergleich: Wikidata-/DDB-Metadaten</h1>
      </div>
      <div class="card-body p-3 p-lg-4">
        <form id="loadForm" class="row mb-3">
          <div class="col-12">
            <div class="input-group input-group-lg">
              <div class="position-relative flex-grow-1">
                <input id="identifier" type="text" class="form-control form-control-lg pe-5 rounded-end-0" placeholder="Q130756596 oder DDB-ID" required>
                <button id="clearIdentifier" type="button" aria-label="Eingabe löschen" class="btn btn-sm btn-outline-secondary rounded-circle position-absolute top-50 end-0 translate-middle-y me-2 p-0 d-none" style="width:1.5rem;height:1.5rem;line-height:1">&times;</button>
              </div>
              <button id="submitBtn" type="submit" class="btn btn-primary">Laden</button>
            </div>
            <div class="small text-secondary text-truncate mt-1" title="Beispiele: Klick setzt den Wert ins Eingabefeld">
              Beispiele:
              <a class="example-id link-secondary text-decoration-none" data-value="2Q37XY5KXJNJE5MV6SWP3UKKZ6RSBLK5" href="#">DNB</a> |
              <a class="example-id link-secondary text-decoration-none" data-value="XYMQPA4OHAYDDFYWHV6Q4RFUIISTLQJV" href="#">LABW</a> |
              <a class="example-id link-secondary text-decoration-none" data-value="Z3C5F6OSJ7T2RXD6RH3CQSJZISFAIMZH" href="#">DAM</a> |
              <a class="example-id link-secondary text-decoration-none" data-value="4HYDA3GLAFDI5RL4YZDMXTA5UVGNXO7N" href="#">DFF</a>
            </div>
          </div>
        </form>

        <div id="status" class="small text-secondary mb-3" style="min-height:1.25rem"></div>

        <div class="row g-3">
          <div class="col-12 col-lg-6">
            <div class="small fw-bold text-primary-emphasis mb-2">Transformiertes XML (Service)</div>
            <div class="small mb-1">
              <a id="wikidataLink" class="link-primary text-decoration-none d-none" href="#" target="_blank" rel="noopener noreferrer"></a>
            </div>
            <textarea id="leftXml" class="form-control codebox" spellcheck="false" readonly></textarea>
          </div>
          <div class="col-12 col-lg-6">
            <div class="small fw-bold text-primary-emphasis mb-2">DDB Source XML</div>
            <div class="small mb-1">
              <a id="ddbPortalLink" class="link-primary text-decoration-none d-none" href="#" target="_blank" rel="noopener noreferrer"></a>
            </div>
            <textarea id="rightXml" class="form-control codebox" spellcheck="false" readonly></textarea>
          </div>
        </div>

        <div id="diffOutput"></div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>
  <script>
    const IDENTIFIER_STORAGE_KEY = "ddb-xml-compare.identifier";

    function showStatus(message, isError) {
      const el = $("#status");
      el.text(message || "");
      el.css("color", isError ? "#b42318" : "#234");
    }

    function resetView() {
      $("#leftXml").val("");
      $("#rightXml").val("");
      $("#diffOutput").html("");
      $("#wikidataLink").addClass("d-none").attr("href", "#").text("");
      $("#ddbPortalLink").addClass("d-none").attr("href", "#").text("");
      showStatus("", false);
    }

    function extractTagValue(xmlText, tagName) {
      const regex = new RegExp(`<${tagName}>([^<]+)</${tagName}>`);
      const match = xmlText.match(regex);
      return match ? match[1].trim() : "";
    }

    function updateReferenceLinks(identifier, transformedXml) {
      const wkdId = extractTagValue(transformedXml, "org:wkdId") || extractTagValue(transformedXml, "wkdId");
      if (wkdId) {
        const wikiUrl = `https://www.wikidata.org/wiki/${encodeURIComponent(wkdId)}`;
        $("#wikidataLink").attr("href", wikiUrl).text(wikiUrl).removeClass("d-none");
      }

      if (isDdbId(identifier)) {
        const ddbUrl = `https://www.deutsche-digitale-bibliothek.de/organization/${encodeURIComponent(identifier)}`;
        $("#ddbPortalLink")
          .attr("href", ddbUrl)
          .text(ddbUrl)
          .removeClass("d-none");
      }
    }

    function toggleClearButton() {
      const hasValue = $("#identifier").val().trim().length > 0;
      $("#clearIdentifier").toggleClass("d-none", !hasValue);
    }

    function isDdbId(value) {
      return /^(?:[A-Z2-7]{8})*(?:[A-Z2-7]{2}={6}|[A-Z2-7]{4}={4}|[A-Z2-7]{5}={3}|[A-Z2-7]{7}=)?$/.test(value);
    }

    async function loadTransformed(identifier) {
      const resp = await fetch(`/organization/${encodeURIComponent(identifier)}`);
      const body = await resp.text();
      if (!resp.ok) {
        throw new Error(`Transform-API: ${body}`);
      }
      return body;
    }

    async function loadDdbSource(identifier) {
      const resp = await fetch(`/source/${encodeURIComponent(identifier)}`);
      const body = await resp.text();
      if (!resp.ok) {
        throw new Error(`DDB-API: ${body}`);
      }
      return body;
    }

    function renderDiff(left, right) {
      if (!left.trim() && !right.trim()) {
        $("#diffOutput").html("");
        return;
      }

      const patch = Diff.createTwoFilesPatch(
        "transformiert.xml",
        "ddb-source.xml",
        left,
        right,
        "",
        "",
        { context: 3 }
      );
      const html = Diff2Html.html(patch, {
        drawFileList: false,
        matching: "lines",
        outputFormat: "side-by-side"
      });
      $("#diffOutput").html(html);
    }

    $("#identifier").on("input", function () {
      const value = $(this).val().trim();
      if (value) {
        localStorage.setItem(IDENTIFIER_STORAGE_KEY, value);
      } else {
        localStorage.removeItem(IDENTIFIER_STORAGE_KEY);
      }
      toggleClearButton();
    });

    $("#clearIdentifier").on("click", function () {
      $("#identifier").val("").trigger("input").focus();
    });

    $(".example-id").on("click", function (event) {
      event.preventDefault();
      const value = ($(this).data("value") || "").toString().trim();
      $("#identifier").val(value).trigger("input").focus();
    });

    $("#loadForm").on("submit", async function (event) {
      event.preventDefault();
      resetView();

      const identifier = $("#identifier").val().trim();
      if (!identifier) {
        return;
      }

      const button = $("#submitBtn");
      button.prop("disabled", true).text("Lade...");
      showStatus("Lade Daten...", false);

      try {
        const transformed = await loadTransformed(identifier);
        $("#leftXml").val(transformed);
        updateReferenceLinks(identifier, transformed);

        if (isDdbId(identifier)) {
          const ddbXml = await loadDdbSource(identifier);
          $("#rightXml").val(ddbXml);
        } else {
          $("#rightXml").val("");
        }

        renderDiff($("#leftXml").val(), $("#rightXml").val());
        showStatus("Fertig", false);
      } catch (error) {
        showStatus(error.message || String(error), true);
      } finally {
        button.prop("disabled", false).text("Laden");
      }
    });

    $(function () {
      const savedIdentifier = localStorage.getItem(IDENTIFIER_STORAGE_KEY);
      if (savedIdentifier) {
        $("#identifier").val(savedIdentifier);
      }
      toggleClearButton();
    });
  </script>
</body>
</html>
